<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>CodeForge Academy</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    /* Oculta el contenido hasta que Angular arranque */
    app-root:empty + .loading {
      display: flex;
    }
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* Corregido: Coincide con tu variable --color-bg */
      background: #0D1B2E; 
      /* Corregido: Color de texto para que sea legible sobre el fondo oscuro */
      color: #E2E8F0; 
      display: none;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      z-index: 9999;
    }
  </style>
</head>
<body style="background-color: #0D1B2E; color: #E2E8F0; margin: 0;">
  <app-root></app-root>
  <div class="loading">Cargando...</div>
</body>
</html>
