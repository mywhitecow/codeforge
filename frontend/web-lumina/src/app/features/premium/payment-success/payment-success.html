<section class="min-h-screen py-16 px-4 bg-[#141b21] flex flex-col items-center justify-center -mt-[80px]">
  <div class="max-w-md w-full bg-[#1b252f] rounded-3xl p-8 border border-slate-700/30 shadow-lg text-center">
    
    <div *ngIf="loading" class="flex flex-col items-center">
      <svg class="animate-spin h-10 w-10 text-emerald-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      <h3 class="text-xl font-bold text-white">Verificando Pāgo...</h3>
      <p class="text-slate-400 mt-2">Por favor espera un momento.</p>
    </div>

    <div *ngIf="!loading && success" class="flex flex-col items-center">
      <div class="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <h3 class="text-2xl font-bold text-white">¡Pago Exitoso!</h3>
      <p class="text-slate-400 mt-2 mb-6">Tu suscripción ha sido activada correctamente.</p>
      <p class="text-sm text-slate-500 animate-pulse">Redirigiendo...</p>
    </div>

    <div *ngIf="!loading && !success" class="flex flex-col items-center">
      <div class="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </div>
      <h3 class="text-2xl font-bold text-white">Error de Pago</h3>
      <p class="text-slate-400 mt-2 mb-6">{{ errorMsg }}</p>
      <a routerLink="/premium" class="w-full py-3 px-4 rounded-xl font-semibold bg-slate-700 hover:bg-slate-600 text-white transition-all">
        Volver a Premium
      </a>
    </div>

  </div>
</section>
