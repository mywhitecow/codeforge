
<!-- Sección de Precios Premium -->
<section class="min-h-screen py-16 px-4 bg-[#0b1015] font-sans">
  <div class="max-w-7xl mx-auto">
    <!-- Título de la sección -->
    <div class="text-center mb-12">
      <h2 class="text-4xl font-bold text-white mb-4">Planes Premium</h2>
      <p class="text-gray-400 text-lg">Elige el plan perfecto para tu aprendizaje</p>
    </div>

    <!-- Grid de tarjetas de precios -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Tarjeta de Plan -->
      <div
        *ngFor="let plan of plans"
        class="bg-[#141c26] rounded-2xl p-6 flex flex-col relative"
        [class.ring-2]="plan.isPopular"
        [class.ring-emerald-500]="plan.isPopular"
      >
        <!-- Badge de Descuento -->
        <div
          *ngIf="plan.discount"
          class="absolute -top-3 right-4 bg-emerald-500 text-white text-xs font-bold px-3 py-1 rounded-full"
        >
          {{ plan.discount }}
        </div>

        <!-- Título del Plan -->
        <h3 class="text-xl font-semibold text-white mb-2">{{ plan.title }}</h3>

        <!-- Precio -->
        <div class="mb-6">
          <div class="flex items-baseline gap-2">
            <span
              *ngIf="plan.originalPrice"
              class="text-gray-500 line-through text-lg"
            >
              {{ plan.originalPrice }} BS
            </span>
            <span class="text-3xl font-bold text-white">
              {{ plan.price !== null ? (plan.price | number:'1.2-2') + ' BS' : 'Gratis' }}
            </span>
          </div>
        </div>

        <!-- Lista de Beneficios -->
        <ul class="space-y-3 mb-8 flex-grow">
          <li *ngFor="let benefit of plan.benefits" class="flex items-start gap-3">
            <svg
              class="w-5 h-5 text-emerald-500 mt-0.5 flex-shrink-0"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              ></path>
            </svg>
            <span class="text-gray-300 text-sm">{{ benefit }}</span>
          </li>
        </ul>

        <!-- Botón CTA -->
        <button
          class="w-full py-3 px-4 rounded-lg font-semibold transition-colors"
          [class.bg-emerald-500]="plan.isPopular || plan.price === 0"
          [class.hover:bg-emerald-600]="plan.isPopular || plan.price === 0"
          [class.bg-white]="!plan.isPopular && plan.price !== 0"
          [class.hover:bg-gray-100]="!plan.isPopular && plan.price !== 0"
          [class.text-gray-900]="!plan.isPopular && plan.price !== 0"
          [class.text-white]="plan.isPopular || plan.price === 0"
        >
          {{ plan.price === 0 ? 'Comenzar Gratis' : 'Suscribirse' }}
        </button>
      </div>
    </div>
  </div>
</section>
